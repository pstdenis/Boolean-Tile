<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boolean Tile — IFS Waveform Explorer</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#0B0E14}
        body{font-family:system-ui,sans-serif;color:#E2E8F0}
        .page{position:absolute;left:0;top:0;width:fit-content;height:fit-content;transform-origin:0 0}

        header{display:flex;align-items:center;gap:8px;padding:5px 0;flex-wrap:nowrap;height:36px}
        header h1{font-size:14px;font-weight:700;color:#f1f5f9;white-space:nowrap}
        header label{font-size:11px;font-weight:600;color:#94a3b8;white-space:nowrap}
        header input[type=range]{width:50px;accent-color:#38bdf8;cursor:pointer;height:3px}
        header select{font-size:11px;padding:1px 4px;border:1px solid #475569;border-radius:4px;background:#1e293b;color:#e2e8f0;cursor:pointer;outline:none}
        header .val{font-size:11px;font-weight:600;color:#38bdf8;min-width:26px;text-align:center}
        header .name{font-size:12px;font-weight:600;color:#38bdf8}
        header .status{font-size:11px;color:#f43f5e;font-weight:600;display:none}
        footer{height:4px}

        .main-content{display:flex;gap:12px}
        .left-panel{width:420px;flex-shrink:0}
        #oscilloscope{width:100%;height:480px;background:#050505;border-radius:8px;border:1px solid #1e293b;display:block}
        .right-panel{width:480px;flex-shrink:0}

        #tileGrid{width:100%;aspect-ratio:1/1;display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
        .tile-card{position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:8px;background:#1e293b;border:2px solid transparent;cursor:pointer}
        .tile-card canvas{display:block;width:calc(100% - 30px);height:calc(100% - 30px);image-rendering:auto;border-radius:3px}
        .tile-header{position:absolute;top:0;left:0;right:0;text-align:center;padding:2px 3px;font-size:11px;font-weight:700;color:#e2e8f0;line-height:1.1;z-index:1;pointer-events:none}
        .tile-card.active{border-color:#38bdf8;box-shadow:0 0 14px rgba(56,189,248,0.3)}
        .tile-card:hover{border-color:#6366f1}

        .toggle{position:relative;display:inline-flex;align-items:center;gap:5px;cursor:pointer;font-size:11px;font-weight:600;color:#94a3b8;user-select:none}
        .toggle input{opacity:0;width:0;height:0;position:absolute}
        .toggle .tk{position:relative;display:inline-block;width:28px;height:16px;flex-shrink:0;background:#475569;border-radius:16px;transition:.25s}
        .toggle .tk:after{content:'';position:absolute;height:12px;width:12px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.25s}
        .toggle input:checked+.tk{background:#38bdf8}
        .toggle input:checked+.tk:after{transform:translateX(12px)}
    </style>
</head>
<body>

<div class="page">
    <header>
        <h1>Boolean Tile — IFS Waveform</h1>
        <label>Depth</label>
        <input type="range" id="depthSlider" min="1" max="8" value="1">
        <span class="val" id="depthLabel">4</span>
        <label>Vol</label>
        <input type="range" id="volumeSlider" min="0" max="100" value="30">
        <label>Pos</label>
        <input type="range" id="posSlider" min="0" max="100" value="0">
        <label class="toggle">
            <input type="checkbox" id="autoZoom">
            <span class="tk"></span>
            Zoom
        </label>
        <span class="name" id="activeTileDisplay">—</span>
        <span class="status" id="audioStatus">● PLAYING</span>
    </header>

    <div class="main-content">
        <div class="left-panel">
            <canvas id="oscilloscope" width="840" height="960"></canvas>
        </div>
        <div class="right-panel">
            <main id="tileGrid"></main>
        </div>
    </div>
    <footer></footer>
</div>

<script>
    const TILES = [
        { index: 0,  name: "FALSE",  bits: [0,0,0,0] },
        { index: 1,  name: "AND",    bits: [0,0,0,1] },
        { index: 2,  name: "A∧¬B",   bits: [0,0,1,0] },
        { index: 3,  name: "A",      bits: [0,0,1,1] },
        { index: 4,  name: "¬A∧B",   bits: [0,1,0,0] },
        { index: 5,  name: "B",      bits: [0,1,0,1] },
        { index: 6,  name: "XOR",    bits: [0,1,1,0] },
        { index: 7,  name: "OR",     bits: [0,1,1,1] },
        { index: 8,  name: "NOR",    bits: [1,0,0,0] },
        { index: 9,  name: "XNOR",   bits: [1,0,0,1] },
        { index: 10, name: "¬B",     bits: [1,0,1,0] },
        { index: 11, name: "B→A",    bits: [1,0,1,1] },
        { index: 12, name: "¬A",     bits: [1,1,0,0] },
        { index: 13, name: "A→B",    bits: [1,1,0,1] },
        { index: 14, name: "NAND",   bits: [1,1,1,0] },
        { index: 15, name: "TRUE",   bits: [1,1,1,1] }
    ];

    let currentTileId = null;
    let currentDepth = 4;
    let zoomPower = 0;
    let currentZoom = 1;
    let isPlaying = false;
    let isAutoZoom = false;
    let animationFrame = null;
    let prevZoomT = 0;
    let zoomPhase = 0;
    let lastZoomTime = 0;

    let audioCtx = null;
    let voices = [];
    let baseVolume = 0.164;
    let phasePos = 0;

    const grid = document.getElementById('tileGrid');
    const oscCanvas = document.getElementById('oscilloscope');
    const oscCtx = oscCanvas.getContext('2d');
    const slider = document.getElementById('depthSlider');
    const dLabel = document.getElementById('depthLabel');
    const volumeSlider = document.getElementById('volumeSlider');
    const posSlider = document.getElementById('posSlider');
    const autoZoomChk = document.getElementById('autoZoom');
    const activeTileDisp = document.getElementById('activeTileDisplay');
    const audioStatusEl = document.getElementById('audioStatus');

    // --- Tile IFS rendering ---

    function drawTile(canvasId, tileIndex, depth) {
        const c = document.getElementById(canvasId);
        const ctx = c.getContext('2d', { alpha: false });
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, 200, 200);
        const N = 1 << depth;
        const cellSz = 200 / N;
        const maxVal = (1 << depth) - 1;
        for (let r = 0; r < N; r++) {
            for (let col = 0; col < N; col++) {
                let acc = 0;
                for (let i = 0; i < depth; i++) {
                    const rb = (r >> (depth - 1 - i)) & 1;
                    const cb = (col >> (depth - 1 - i)) & 1;
                    const bit = (tileIndex >> (3 - (rb * 2 + cb))) & 1;
                    acc += bit * (1 << (depth - 1 - i));
                }
                if (acc === 0) continue;
                const ratio = acc / maxVal;
                ctx.fillStyle = `rgb(${255 - ratio * 228},${255 - ratio * 217},${255 - ratio * 174})`;
                const x = Math.floor(col * cellSz);
                const y = Math.floor(r * cellSz);
                const x2 = Math.ceil((col + 1) * cellSz);
                const y2 = Math.ceil((r + 1) * cellSz);
                ctx.fillRect(x, y, x2 - x, y2 - y);
            }
        }
    }

    function initGrid() {
        grid.innerHTML = '';
        TILES.forEach(t => {
            const card = document.createElement('div');
            card.className = 'tile-card';
            card.dataset.id = t.index;
            card.innerHTML = `
                <canvas id="tc${t.index}" width="200" height="200"></canvas>
                <div class="tile-header">${t.name}</div>
            `;
            card.addEventListener('click', () => handleTileClick(t.index));
            grid.appendChild(card);
        });
    }

    function renderTiles() {
        TILES.forEach(t => drawTile('tc' + t.index, t.index, currentDepth));
    }

    // --- Waveform / Oscilloscope ---

    function getFractalWaveValue(bits, phase, depth, fineWeight) {
        fineWeight = fineWeight || 0;
        let a = 0;
        for (let k = 0; k < depth; k++) {
            const lp = (phase * Math.pow(4, k)) % 1;
            const si = Math.floor(lp * 4);
            const bv = bits[si] === 1 ? 1 : -1;
            a += bv / Math.pow(2, k);
        }
        if (fineWeight > 0) {
            const lp = (phase * Math.pow(4, depth)) % 1;
            const si = Math.floor(lp * 4);
            const bv = bits[si] === 1 ? 1 : -1;
            a += fineWeight * bv / Math.pow(2, depth);
        }
        return a;
    }

    function drawWaveform(tileIndex, depth) {
        const w = oscCanvas.width, h = oscCanvas.height;
        oscCtx.clearRect(0, 0, w, h);
        oscCtx.strokeStyle = '#1e293b';
        oscCtx.lineWidth = 1;
        oscCtx.beginPath();
        oscCtx.moveTo(0, h / 2);
        oscCtx.lineTo(w, h / 2);
        for (let i = 1; i < 4; i++) {
            oscCtx.moveTo(w * (i / 4), 0);
            oscCtx.lineTo(w * (i / 4), h);
        }
        oscCtx.stroke();
        if (tileIndex === null) return;

        const bits = TILES[tileIndex].bits;
        const pts = 1000;
        const ys = Math.pow(2, zoomPower);
        const fbv = bits[0] === 1 ? 1 : -1;
        const yo = 2 * fbv * (1 - Math.pow(2, -zoomPower));
        const fw = zoomPower - Math.floor(zoomPower);
        const offset = Math.min(phasePos / 100, Math.max(0, 1 - 1 / currentZoom));
        oscCtx.strokeStyle = '#38bdf8';
        oscCtx.lineWidth = 3;
        oscCtx.shadowBlur = 10;
        oscCtx.shadowColor = '#38bdf8';
        oscCtx.beginPath();
        for (let i = 0; i <= pts; i++) {
            const p = offset + (i / pts) / currentZoom;
            const r = getFractalWaveValue(bits, p, depth, fw);
            const adj = (r - yo) * ys;
            const cy = (h / 2) - (adj / 2) * (h / 2) * 0.8;
            const cx = (i / pts) * w;
            i === 0 ? oscCtx.moveTo(cx, cy) : oscCtx.lineTo(cx, cy);
        }
        oscCtx.stroke();
        oscCtx.shadowBlur = 0;
    }

    // --- Audio ---

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function buildTileBuffer(bits, depth) {
        const sr = audioCtx.sampleRate;
        const sp = Math.floor(sr / 110);
        const buf = audioCtx.createBuffer(1, sp, sr);
        const d = buf.getChannelData(0);
        for (let i = 0; i < sp; i++) d[i] = getFractalWaveValue(bits, i / sp, depth);
        return buf;
    }

    function playTileAudio(tileIndex, depth) {
        initAudio();
        stopTileAudio(true);
        const bits = TILES[tileIndex].bits;
        voices = [0, 1].map(() => {
            const src = audioCtx.createBufferSource();
            src.buffer = buildTileBuffer(bits, depth);
            src.loop = true;
            const gain = audioCtx.createGain();
            gain.gain.value = 0;
            src.connect(gain);
            gain.connect(audioCtx.destination);
            src.start();
            return { source: src, gain };
        });
        isPlaying = true;
        audioStatusEl.style.display = 'inline';
        prevZoomT = zoomPower;
        isAutoZoom ? updateAudioZoom(zoomPower) : setSingleVoiceMix(true);
    }

    function setSingleVoiceMix(initial) {
        if (!voices.length || !audioCtx) return;
        const n = audioCtx.currentTime;
        const [a, b] = voices;
        a.source.playbackRate.setTargetAtTime(currentZoom, n, 0.05);
        b.source.playbackRate.setTargetAtTime(currentZoom, n, 0.05);
        if (initial) {
            a.gain.gain.cancelScheduledValues(n);
            a.gain.gain.setValueAtTime(0, n);
            a.gain.gain.linearRampToValueAtTime(baseVolume, n + 0.05);
            b.gain.gain.setValueAtTime(0, n);
        } else {
            a.gain.gain.setTargetAtTime(baseVolume, n, 0.05);
            b.gain.gain.setTargetAtTime(0, n, 0.05);
        }
    }

    function updateAudioZoom(t) {
        if (!voices.length || !isPlaying || !audioCtx) return;
        if (t < prevZoomT) voices.reverse();
        prevZoomT = t;
        const n = audioCtx.currentTime;
        const th = t * Math.PI / 2;
        const [a, b] = voices;
        a.source.playbackRate.setTargetAtTime(Math.pow(4, t), n, 0.02);
        b.source.playbackRate.setTargetAtTime(Math.pow(4, t - 1), n, 0.02);
        a.gain.gain.setTargetAtTime(baseVolume * Math.cos(th), n, 0.02);
        b.gain.gain.setTargetAtTime(baseVolume * Math.sin(th), n, 0.02);
    }

    function stopTileAudio(immediate) {
        if (!voices.length) { isPlaying = false; return; }
        const n = audioCtx ? audioCtx.currentTime : 0;
        const toStop = voices;
        voices = [];
        isPlaying = false;
        audioStatusEl.style.display = 'none';
        toStop.forEach(v => {
            try {
                v.gain.gain.cancelScheduledValues(n);
                v.gain.gain.setValueAtTime(0, immediate ? 0 : n + 0.02);
            } catch (e) {}
            setTimeout(() => { try { v.source.stop(); } catch (e) {} }, immediate ? 0 : 80);
        });
    }

    // --- Interaction ---

    function handleTileClick(id) {
        initAudio();
        const same = currentTileId === id;
        document.querySelectorAll('.tile-card').forEach(c => c.classList.remove('active'));
        if (same && isPlaying) {
            stopTileAudio();
            currentTileId = null;
            activeTileDisp.textContent = '—';
            drawWaveform(null, currentDepth);
            return;
        }
        currentTileId = id;
        phasePos = 0;
        posSlider.value = 0;
        document.querySelector(`.tile-card[data-id='${id}']`).classList.add('active');
        activeTileDisp.textContent = TILES[id].name;
        drawWaveform(currentTileId, currentDepth);
        playTileAudio(currentTileId, currentDepth);
    }

    // --- Zoom Sweep ---

    function runAutoZoom() {
        if (!isAutoZoom) return;
        const now = performance.now();
        if (lastZoomTime === 0) lastZoomTime = now;
        zoomPhase = (zoomPhase + (now - lastZoomTime) / 5000) % 1;
        lastZoomTime = now;
        zoomPower = zoomPhase;
        currentZoom = Math.pow(4, zoomPower);
        if (isPlaying) updateAudioZoom(zoomPower);
        if (currentTileId !== null) drawWaveform(currentTileId, currentDepth);
        animationFrame = requestAnimationFrame(runAutoZoom);
    }

    autoZoomChk.addEventListener('change', e => {
        isAutoZoom = e.target.checked;
        if (isAutoZoom) {
            prevZoomT = zoomPower;
            lastZoomTime = 0;
            runAutoZoom();
        } else {
            cancelAnimationFrame(animationFrame);
            if (isPlaying) setSingleVoiceMix(false);
        }
    });

    // --- Listeners ---

    slider.addEventListener('input', function() {
        currentDepth = parseInt(this.value);
        dLabel.textContent = currentDepth;
        renderTiles();
        if (currentTileId !== null) {
            drawWaveform(currentTileId, currentDepth);
            if (isPlaying) playTileAudio(currentTileId, currentDepth);
        }
        setTimeout(fitPage, 10);
    });

    volumeSlider.addEventListener('input', function() {
        baseVolume = (parseInt(this.value) / 100) * 0.48 + 0.02;
        if (isPlaying) {
            if (isAutoZoom) updateAudioZoom(zoomPower);
            else setSingleVoiceMix(false);
        }
    });

    posSlider.addEventListener('input', function() {
        phasePos = parseFloat(this.value);
        if (currentTileId !== null) drawWaveform(currentTileId, currentDepth);
    });

    // --- fitPage ---

    function fitPage() {
        const page = document.querySelector('.page');
        const sw = page.offsetWidth, sh = page.offsetHeight;
        const s = Math.min((innerWidth - 40) / sw, innerHeight / sh);
        const x = Math.max(20, Math.round((innerWidth - sw * s) / 2));
        const y = 0;
        page.style.transform = `translate(${x}px, ${y}px) scale(${s})`;
    }

    function onReady() {
        initGrid();
        currentDepth = parseInt(slider.value);
        dLabel.textContent = currentDepth;
        renderTiles();
        drawWaveform(null, currentDepth);
        const page = document.querySelector('.page');
        new ResizeObserver(fitPage).observe(page);
        fitPage();
    }

    window.addEventListener('load', onReady);
    window.addEventListener('resize', fitPage);
    document.querySelectorAll('select, input').forEach(el => {
        el.addEventListener('change', () => setTimeout(fitPage, 10));
    });
</script>
</body>
</html>
